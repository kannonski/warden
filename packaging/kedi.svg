<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="kedi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f5c"/>
      <stop offset="1" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="cat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cba6f7"/>
      <stop offset="1" stop-color="#b48ef0"/>
