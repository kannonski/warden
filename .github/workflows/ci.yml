name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # kedi-app (Tauri) links GTK/webkit at build time — clippy/build/test compile the whole workspace,
      # so the Linux dev libs must be present here too (release.yml installs the same set for bundling).
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            guest

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace

      # the WASM component guest lives in its own workspace (wasm32-wasip2); building it here
      # lets the component-model e2e tests run instead of self-skipping
      - name: guest component
        run: cargo build --release --target wasm32-wasip2
        working-directory: guest

      - name: test
        run: cargo test --workspace
