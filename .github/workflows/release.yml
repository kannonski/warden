name: release

# Build the kedi terminal (the Tauri app, crates/kedi-app) for every platform on a version tag (or a
# manual run) and upload to a draft GitHub Release: macOS universal .dmg/.app, Linux .AppImage/.deb/.rpm,
# Windows .msi/.exe (NSIS). The UI is static (embedded via include_dir), so there is no JS build step.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust-targets: ""
            args: ""
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing/notarization intentionally omitted for now. To enable later, add here:
          #   macOS:  APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #           APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          #   updater: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
        with:
          projectPath: crates/kedi-app
          tagName: ${{ github.ref_name }}
          releaseName: "kedi ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
