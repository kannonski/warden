<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kedi — governed terminal</title>
<!-- favicon: the cat glyph, inline so the single binary carries its own tab icon (no extra route/asset) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22128%22%20height%3D%22128%22%20viewBox%3D%220%200%20128%20128%22%20role%3D%22img%22%20aria-label%3D%22kedi%22%3E%20%3Cdefs%3E%20%3ClinearGradient%20id%3D%22bg%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%233a2f5c%22%2F%3E%20%3Cstop%20offset%3D%221%22%20stop-color%3D%22%231e1e2e%22%2F%3E%20%3C%2FlinearGradient%3E%20%3ClinearGradient%20id%3D%22cat%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23cba6f7%22%2F%3E%20%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23b48ef0%22%2F%3E%20%3C%2FlinearGradient%3E%20%3C%2Fdefs%3E%20%3Crect%20width%3D%22128%22%20height%3D%22128%22%20rx%3D%2228%22%20fill%3D%22url%28%23bg%29%22%2F%3E%20%3Cg%20stroke%3D%22%23cba6f7%22%20stroke-width%3D%224.5%22%20stroke-linecap%3D%22round%22%20opacity%3D%22.55%22%3E%20%3Cpath%20d%3D%22M22%2060%20H8%20M23%2071%20H12%22%2F%3E%20%3Cpath%20d%3D%22M106%2060%20h14%20M105%2071%20h11%22%2F%3E%20%3C%2Fg%3E%20%3Cpath%20fill%3D%22url%28%23cat%29%22%20d%3D%22M40%2044%20L38%2022%20L55%2034%20Q64%2030%2073%2034%20L90%2022%20L88%2044%20Q99%2055%2099%2068%20Q99%2096%2064%2096%20Q29%2096%2029%2068%20Q29%2055%2040%2044%20Z%22%2F%3E%20%3Cg%20fill%3D%22none%22%20stroke%3D%22%231e1e2e%22%20stroke-width%3D%224.2%22%20stroke-linecap%3D%22round%22%3E%20%3Cpath%20d%3D%22M46%2064%20q7%207%2014%200%22%2F%3E%20%3Cpath%20d%3D%22M68%2064%20q7%207%2014%200%22%2F%3E%20%3C%2Fg%3E%20%3Cpath%20fill%3D%22%231e1e2e%22%20d%3D%22M59%2074%20h10%20l-5%206%20Z%22%2F%3E%20%3C%2Fsvg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
<style>
  :root {
    /* Catppuccin Mocha (matches the user's kitty / p10k / syntax-highlighting) */
    --bg:#1e1e2e; --panel:#181825; --edge:#313244; --fg:#cdd6f4; --dim:#6c7086;
    --cyan:#89dceb; --green:#a6e3a1; --red:#f38ba8; --focus:#cba6f7;
    --term-bg:#1e1e2e; /* the active theme's terminal background — set by applySettings() */
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--fg); display:flex; flex-direction:column;
         font:13px/1.5 "FiraCode Nerd Font", ui-monospace, monospace; overflow:hidden; }
  header { display:flex; align-items:center; gap:9px; padding:8px 14px; border-bottom:1px solid var(--edge); flex:0 0 auto; }
  header h1 { margin:0; font-size:16px; font-weight:600; letter-spacing:.06em; }
  header h1 .k { color:var(--focus); }
  .badge { background:var(--panel); border:1px solid var(--edge); border-radius:999px; padding:4px 12px; font-size:12px; color:var(--dim); white-space:nowrap; display:inline-flex; align-items:center; gap:7px; }
  .badge b { color:var(--fg); font-weight:600; }
  #conn .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); }
  #conn.on .dot { background:var(--green); } #conn.off .dot { background:var(--red); }
  /* the single governance entry point — its dot IS the recording indicator */
  #audit-btn .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); }
  #audit-btn.rec .dot { background:var(--red); animation:recpulse 2.4s ease-in-out infinite; }
  #audit-btn.rec { color:var(--fg); }
  .spacer { flex:1; }

  /* depth via the real Catppuccin surfaces (base → mantle → crust vignette), no off-palette tones */
  #canvas { flex:1 1 auto; min-height:0; position:relative; overflow:hidden; cursor:crosshair;
            background: radial-gradient(1300px 900px at 30% 8%, color-mix(in srgb, var(--term-bg) 88%, #000) 0%, color-mix(in srgb, var(--term-bg) 70%, #000) 64%, #0c0c12 100%);
            transition: background .18s ease; }
  /* the kedi mark — always there, quietly, behind every window */
  #watermark { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
               gap:6px; color:#cba6f7; opacity:.08; pointer-events:none; user-select:none; }
  #watermark .wordmark { font-size:34px; font-weight:600; letter-spacing:.42em; margin-left:.42em; }
  #hint { position:absolute; left:0; right:0; top:68%; color:var(--dim); pointer-events:none; text-align:center; }

  .floatwin { position:absolute; display:flex; min-width:200px; min-height:130px; border:1px solid var(--edge);
              border-radius:9px; overflow:hidden; background:var(--term-bg); will-change:transform; opacity:.97;
              box-shadow:0 6px 20px rgba(0,0,0,.45);
              transition: box-shadow .14s ease, opacity .14s ease, border-color .14s ease;
              animation: winIn .12s ease-out; }
  .floatwin.focused { opacity:1; border-color:var(--focus); box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 0 1px var(--focus); }
  .floatwin.dropping { border-color:var(--green); box-shadow:0 0 0 2px var(--green), 0 10px 30px rgba(0,0,0,.55); } /* file/image drag hovering */
  .floatwin.animate { transition: left .14s ease, top .14s ease, width .14s ease, height .14s ease, box-shadow .14s ease; }
  .floatwin.closing { opacity:0; transform:scale(.985); transition: opacity .1s ease, transform .1s ease; }
  .floatwin.stowed { display:none; }  /* minimized → lives in the taskbar (when that setting is on) */
  .floatwin.stowing { opacity:0; transform:scale(.92) translateY(28px); transition:opacity .13s ease, transform .13s ease; }
  /* minified in place ("window shade"): collapse to the title bar, hide the terminal body. The bar's
     click handler expands it again. min-height override lets it shrink below the normal floor. */
  .floatwin.shaded { min-height:0 !important; }
  .floatwin.shaded .paneterm, .floatwin.shaded .grip { display:none; }
  .floatwin.shaded .panebar { cursor:pointer; }
  .floatwin.shaded .ptitle::after { content:" ▸"; color:var(--dim); } /* affordance: click to expand */
  @keyframes winIn { from { opacity:0; transform:scale(.985); } to { opacity:1; transform:scale(1); } }

  .pane { flex:1 1 0; min-width:0; min-height:0; display:flex; flex-direction:column; background:var(--term-bg); overflow:hidden; }
  .panebar { display:flex; align-items:center; gap:8px; padding:3px 9px; font-size:11px; color:var(--dim);
             background:linear-gradient(var(--panel), #15151f); border-bottom:1px solid var(--edge); flex:0 0 auto; user-select:none; cursor:move; }
  .ptitle { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg); }
  .ptitle::before { content:"\f120"; color:var(--dim); margin-right:7px; font-size:11px; } /* nf-fa-terminal */
  .psize { color:var(--dim); font-size:10px; white-space:nowrap; }
  .prec { display:none; color:var(--red); font-size:10px; white-space:nowrap; animation: recpulse 2.4s ease-in-out infinite; }
  body.rec .prec { display:inline; } /* the per-pane "● rec" badge only shows while recording is on */
  @keyframes recpulse { 0%,100% { opacity:.9; } 50% { opacity:.45; } }
  .pkill { background:none; border:1px solid var(--edge); color:var(--dim); border-radius:5px; font:inherit; font-size:10px; padding:1px 8px; cursor:pointer; transition: color .12s, border-color .12s, background .12s; }
  .pkill:hover { color:#1e1e2e; background:var(--red); border-color:var(--red); } /* kill = deliberate governance action, filled red */
  /* Window controls adapt to the OS (auto-detected, overridable in settings). Three flavors keyed
     off a body class — plat-mac | plat-win | plat-linux. The buttons carry a glyph (::before) that
     only the win/linux flavors reveal; macOS shows bare traffic-light dots. */
  .wcgroup { display:flex; align-items:center; }
  .wc { border:none; padding:0; cursor:pointer; background:none; color:var(--dim);
        font-family:ui-monospace,monospace; line-height:1; transition:background .12s, color .12s, opacity .12s, transform .12s; }
  .wc::before { display:none; }

  /* macOS — traffic lights on the LEFT (order:-1 pulls the group before the title) */
  body.plat-mac .wcgroup { order:-1; gap:7px; margin-right:4px; }
  body.plat-mac .wc { width:12px; height:12px; border-radius:50%; opacity:.92; }
  body.plat-mac .wc:hover { opacity:1; transform:scale(1.12); }
  body.plat-mac .wc.min { background:#f9e2af; } body.plat-mac .wc.max { background:#a6e3a1; } body.plat-mac .wc.close { background:#f38ba8; }

  /* Windows — square, flat, full-bleed on the RIGHT; close goes red on hover */
  body.plat-win .wcgroup { gap:0; margin:-3px -9px -3px 4px; align-self:stretch; } /* cancel panebar padding → flush corner */
  body.plat-win .wc { width:34px; align-self:stretch; font-size:11px; border-radius:0; }
  body.plat-win .wc::before { display:inline; }
  body.plat-win .wc.min::before { content:"\2013"; }   /* – */
  body.plat-win .wc.max::before { content:"\25a1"; }   /* ▢ */
  body.plat-win .wc.close::before { content:"\2715"; } /* ✕ */
  body.plat-win .wc:hover { background:rgba(255,255,255,.09); color:var(--fg); }
  body.plat-win .wc.close:hover { background:#e81123; color:#fff; }

  /* Linux (GNOME/Adwaita) — soft round buttons with glyphs on the RIGHT */
  body.plat-linux .wcgroup { gap:6px; margin-left:4px; }
  body.plat-linux .wc { width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.06); font-size:10px; }
  body.plat-linux .wc::before { display:inline; }
  body.plat-linux .wc.min::before { content:"\2013"; }
  body.plat-linux .wc.max::before { content:"\25a1"; }
  body.plat-linux .wc.close::before { content:"\2715"; }
  body.plat-linux .wc:hover { background:rgba(255,255,255,.14); color:var(--fg); }
  body.plat-linux .wc.close:hover { background:var(--red); color:#1e1e2e; }
  /* taskbar: a floating dock of minimized windows. Hidden entirely when empty; when it has chips it
     AUTO-HIDES — tucked just below the bottom edge so it peeks, and slides fully into view on hover
     (or when a chip has focus, for keyboard users). Never permanently occupies the bottom strip. */
  #taskbar { position:fixed; left:50%; bottom:0; z-index:9996; display:none;
             gap:8px; align-items:center; max-width:92vw; overflow-x:auto; padding:7px 9px; border-radius:13px 13px 0 0;
             background:rgba(24,24,37,.72); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
             border:1px solid var(--edge); border-bottom:none; box-shadow:0 8px 28px rgba(0,0,0,.5);
             transform:translateX(-50%) translateY(calc(100% - 6px)); transition:transform .18s ease; }
  #taskbar.show { display:flex; }
  #taskbar:hover, #taskbar:focus-within { transform:translateX(-50%) translateY(0); }
  /* a hairline handle so the tucked dock is discoverable */
  #taskbar::before { content:""; position:absolute; top:3px; left:50%; transform:translateX(-50%);
                     width:34px; height:3px; border-radius:2px; background:var(--dim); opacity:.6; }
  .taskchip { display:flex; align-items:center; gap:7px; max-width:210px; cursor:pointer; padding:5px 11px; border-radius:8px;
              font:inherit; font-size:12px; color:var(--fg); background:var(--panel); border:1px solid var(--edge);
              transition:border-color .12s, background .12s, transform .12s; animation:chipIn .14s ease-out; }
  .taskchip:hover { border-color:var(--focus); background:#20202e; transform:translateY(-1px); }
  .taskchip .tdot { width:7px; height:7px; border-radius:50%; background:var(--green); flex:0 0 auto; }
  .taskchip .tlabel { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @keyframes chipIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .paneterm { flex:1 1 auto; min-height:0; min-width:0; position:relative; }
  .paneterm .xterm { height:100%; width:100%; }
  .xterm-viewport::-webkit-scrollbar { width:9px; }
  .xterm-viewport::-webkit-scrollbar-thumb { background:#45475a; border-radius:6px; border:2px solid transparent; background-clip:padding-box; }
  .xterm-viewport::-webkit-scrollbar-thumb:hover { background:#585b70; }
  .xterm-viewport::-webkit-scrollbar-track { background:transparent; }

  .grip { position:absolute; right:0; bottom:0; width:15px; height:15px; cursor:nwse-resize; z-index:2;
          background:linear-gradient(135deg, transparent 45%, var(--dim) 45%, var(--dim) 55%, transparent 55%); }
  #snap { position:absolute; display:none; border:2px solid var(--cyan); background:rgba(86,200,216,.12); border-radius:6px; pointer-events:none; z-index:9998; }
  .marquee { position:absolute; border:1px dashed var(--cyan); background:rgba(137,220,235,.08); pointer-events:none; }
  #ctxmenu { position:absolute; display:none; min-width:190px; z-index:9997; padding:5px; border-radius:10px;
             background:rgba(24,24,37,.88); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
             border:1px solid var(--edge); box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .cm-item { display:flex; justify-content:space-between; gap:14px; padding:6px 10px; border-radius:6px; font-size:12px;
             color:var(--fg); cursor:pointer; white-space:nowrap; }
  .cm-item:hover { background:#20202e; color:var(--focus); }
  .cm-item .cm-k { color:var(--dim); font-size:11px; }
  #overlay { position:absolute; inset:0; display:none; place-items:center; text-align:center; z-index:9999; background:rgba(11,14,20,.7); color:var(--dim); }
  #overlay button { background:var(--panel); border:1px solid var(--cyan); color:var(--cyan); border-radius:7px; padding:6px 16px; font:inherit; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>
<header>
  <h1>🐱 <span class="k">kedi</span></h1>
  <span class="spacer"></span>
  <button class="badge btn" id="idchip" title="claimed identity for new sessions — click to change (attribution, not authentication)"> <b></b></button>
  <button class="badge btn" id="audit-btn" title="audit — live sessions, event timeline, replay, kill"><span class="dot"></span>audit</button>
  <span class="badge" id="conn" title="the warden you're connected to"><span class="dot"></span>⌂ <b id="warden-name">warden</b></span>
  <button class="badge btn" id="settings-btn" title="settings — theme, font, cursor, layout">⚙</button>
  <button class="badge btn" id="quit-btn" title="shut down kedi (ends all sessions)">⏻</button>
</header>

<div id="tabstrip"></div>
<div id="canvas">
  <div id="watermark">
    <svg width="150" height="150" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M25 35 L24 15 L38 26 Q50 21 62 26 L76 15 L75 35 Q83 45 83 56 Q83 79 50 79 Q17 79 17 56 Q17 45 25 35 Z"/>
      <path d="M35 52 q5 5 10 0"/><path d="M55 52 q5 5 10 0"/>
      <path d="M46.5 63 h7 l-3.5 4.5 Z"/>
      <path d="M13 55 H3 M14 62 H5"/><path d="M87 55 h10 M86 62 h9"/>
    </svg>
    <div class="wordmark">KEDI</div>
  </div>
  <div id="hint">double-click for a terminal · drag to draw one · <kbd>Ctrl+Shift+N</kbd></div>
  <div id="ctxmenu"></div>
  <div id="snap"></div>
  <div id="overlay"></div>
</div>
<div id="taskbar"></div>

<div id="search">
  <input id="search-input" placeholder="find in window…" autocomplete="off" spellcheck="false">
  <span class="hint2">↵ next · ⇧↵ prev · esc close</span>
</div>
<style>
  #search { position:absolute; right:16px; bottom:14px; display:none; gap:6px; align-items:center; z-index:9997;
            background:var(--panel); border:1px solid var(--edge); border-radius:8px; padding:6px 10px; }
  #search input { background:var(--bg); border:1px solid var(--edge); color:var(--fg); border-radius:5px; padding:4px 8px; font:inherit; outline:none; width:220px; }
  #search input:focus { border-color:var(--cyan); }
  .hint2 { color:var(--dim); font-size:11px; }
  .btn { cursor:pointer; color:var(--fg); transition:border-color .12s, color .12s; }
  .btn:hover { border-color:var(--focus); color:var(--focus); }
</style>

<!-- audit: one governance surface — live sessions + timeline + reconstruction, live or scrubbed back -->
<div id="audit" class="hide">
  <div class="au-top">
    <span class="au-title">audit</span>
    <span id="au-verify" class="badge">…</span>
    <span class="spacer"></span>
    <button id="au-rec" class="au-btn" title="turn recording on/off — writes to the tamper-evident log"><span class="dot"></span><span id="au-rec-label">record</span></button>
    <button id="au-close" class="wc close" title="close (esc)"></button>
  </div>
  <div class="au-main">
    <div class="au-side">
      <div class="au-h">sessions</div>
      <div id="au-sessions"></div>
    </div>
    <div class="au-right">
      <div class="au-mid">
        <div class="au-h">timeline</div>
        <div id="au-feed"></div>
      </div>
      <div class="au-recon">
        <div class="au-h" id="au-recon-h">reconstruction</div>
        <div id="au-term"></div>
      </div>
    </div>
  </div>
  <div class="au-ctrl">
    <button class="au-btn" data-a="start" title="start">⏮</button>
    <button class="au-btn" data-a="back" title="step back">◀</button>
    <button class="au-btn" data-a="fwd" title="step forward">▶</button>
    <button class="au-btn" data-a="end" title="end">⏭</button>
    <input id="au-scrub" type="range" min="0" max="0" value="0" title="scrub the selected session">
    <button class="au-btn live on" id="au-live" title="follow live"><span class="dot"></span>live</button>
    <span id="au-pos" class="au-pos"></span>
  </div>
</div>
<style>
  #audit { position:fixed; inset:22px; z-index:9999; display:flex; flex-direction:column; gap:11px; padding:14px 16px;
           background:rgba(24,24,37,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
           border:1px solid var(--edge); border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.6); }
  #audit.hide { display:none; }
  .au-top { display:flex; align-items:center; gap:12px; }
  .au-title { font-size:15px; font-weight:600; letter-spacing:.05em; }
  #au-verify.ok { color:var(--green); border-color:var(--green); }
  #au-verify.bad { color:#1e1e2e; background:var(--red); border-color:var(--red); }
  #au-verify.off { color:var(--dim); }
  .au-main { flex:1; min-height:0; display:flex; gap:12px; }
  .au-h { color:var(--dim); font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding:0 2px 6px; }
  .au-side { width:240px; flex:0 0 auto; display:flex; flex-direction:column; min-height:0; }
  #au-sessions { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:7px; }
  .au-sess { display:flex; flex-direction:column; gap:4px; padding:8px 10px; border:1px solid var(--edge); border-radius:9px; background:var(--panel); cursor:pointer; transition:border-color .12s; }
  .au-sess:hover { border-color:var(--focus); }
  .au-sess.sel { border-color:var(--focus); background:#20202e; }
  .au-sess.ended { opacity:.5; }
  .au-sess .r1 { display:flex; align-items:center; gap:7px; }
  .au-sess .sid { color:var(--cyan); font-weight:600; }
  .au-sess .who { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .au-sess .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); }
  .au-sess.ended .live-dot { background:var(--dim); }
  .au-sess .r2 { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--dim); }
  .au-sess .caps { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .au-kill { background:none; border:1px solid var(--edge); color:var(--dim); border-radius:5px; font:inherit; font-size:11px; padding:1px 9px; cursor:pointer; transition:color .12s, background .12s, border-color .12s; }
  .au-kill:hover { color:#1e1e2e; background:var(--red); border-color:var(--red); }
  .au-right { flex:1; min-width:0; display:flex; flex-direction:column; gap:11px; }

// On a browser resize, reflow floating windows to the new canvas so nothing is lost off-screen:
//  - a SNAPPED/maximized window re-snaps to its region recomputed for the new size (a left-half
//    window stays the left half — never stranded at old pixels off the edge);
//  - a free-floating window scales its position + size PROPORTIONALLY (50%-wide stays 50%-wide),
//    then is clamped so at least its title bar stays reachable inside the canvas.
// Skips tab mode (windows fill the canvas there) and stowed windows. Refits terminals at the end.
let _lastCanvas = null;
function reflowWindows() {
  const c = $("canvas");
  const nw = c.clientWidth, nh = c.clientHeight;
  if (!nw || !nh) return;
  const prev = _lastCanvas;
  _lastCanvas = { w: nw, h: nh };
  if (SETTINGS.layout === "tab") { fitAll(); return; }
  const rx = prev ? nw / prev.w : 1, ry = prev ? nh / prev.h : 1;
  for (const p of allPanes()) {
    const win = p.floatwin;
    if (!win || win.classList.contains("stowed")) continue;
    win.classList.remove("animate"); // don't animate during a live resize stream
    if (win._snap) {
      // recompute the snap region for the NEW canvas size and re-apply it directly (no animation,
      // no queued fit) — this is what keeps a snapped pane on-screen and correctly sized after resize
      const [x, y, w, h] = snapRegion(win._snap);
      win.style.left = x + "px"; win.style.top = y + "px";
      win.style.width = w + "px"; win.style.height = h + "px";
      // its saved pre-snap geometry should scale too, so un-snapping later lands somewhere sensible
      if (win._restore) win._restore = win._restore.map((v, i) => Math.round(v * (i % 2 ? ry : rx)));
      continue;
    }
    let x = (parseFloat(win.style.left) || 0) * rx;
    let y = (parseFloat(win.style.top) || 0) * ry;
    let w = Math.max(200, (parseFloat(win.style.width) || win.offsetWidth) * rx);
    // clamp so the window (or at least a graspable strip of its title bar) stays inside the canvas
    x = Math.min(Math.max(0, x), Math.max(0, nw - 80));
    y = Math.min(Math.max(0, y), Math.max(0, nh - 40));
    win.style.left = Math.round(x) + "px";
    win.style.top = Math.round(y) + "px";
    win.style.width = Math.round(w) + "px";
    if (!p.shaded) {
      const h = Math.max(130, (parseFloat(win.style.height) || win.offsetHeight) * ry);
      win.style.height = Math.round(h) + "px";
    } else if (p._fullHeight) {
      p._fullHeight = Math.max(130, Math.round((parseFloat(p._fullHeight) || 480) * ry)) + "px";
    }
  }
  fitAll();
}
// Tidy the shell's raw OSC title: drop a "user@host: " prefix, collapse an absolute home dir to ~,
// and fall back to the pane id when the shell sets no title at all (e.g. `zsh -f`).
function fmtTitle(raw, pane) {
  let s = (raw || "").trim();
  if (!s) return "pane " + pane.id;
  s = s.replace(/^[^\s@]+@[^\s:]+[:\s]+/, "");                          // user@host: …
  s = s.replace(/^\/home\/[^/]+/, "~").replace(/^\/root(?=\/|$)/, "~"); // home → ~
  return s.trim() || ("pane " + pane.id);
}
function zoom(dir) {
  SETTINGS.fontSize = dir === 0 ? (Number("__FONT_SIZE__") || 14) : Math.max(8, Math.min(28, SETTINGS.fontSize + dir));
  fontSize = SETTINGS.fontSize;
  for (const p of allPanes()) p.term.options.fontSize = SETTINGS.fontSize;
  fitAll(); saveSettings();
  if (!$("settings").classList.contains("hide")) syncSettingsForm();
}

async function makePane() {
  const wrapper = document.createElement("div"); wrapper.className = "pane";
  const bar = document.createElement("div"); bar.className = "panebar";
  const title = document.createElement("span"); title.className = "ptitle";
  const spacer = document.createElement("span"); spacer.className = "spacer";
  const size = document.createElement("span"); size.className = "psize"; size.textContent = "–"; // live grid size (cols×rows)
  const rec = document.createElement("span"); rec.className = "prec"; rec.textContent = "● rec";
  bar.append(title, spacer, size, rec);
  const termEl = document.createElement("div"); termEl.className = "paneterm";
  wrapper.append(bar, termEl);

  const pane = { wrapper, bar, titleEl: title, id: ++paneCount, writer: null, closing: false, floatwin: null };
  wrapper._pane = pane;
  pane.title = "pane " + pane.id;
  title.textContent = pane.title;

  const term = new Terminal({ ...xtermOpts(), allowProposedApi: true, macOptionIsMeta: true });
  const fit = new FitAddon.FitAddon();
  const search = new SearchAddon.SearchAddon();
  term.loadAddon(fit); term.loadAddon(search);
  try { term.loadAddon(new WebLinksAddon.WebLinksAddon()); } catch (_) {}
  // Unicode 11 widths so xterm agrees with the shell on glyph widths (a mismatch drifts the cursor
  // on prompt/autocomplete redraws — the #1 cause of "cursor won't return to origin")
  try { term.loadAddon(new Unicode11Addon.Unicode11Addon()); term.unicode.activeVersion = "11"; } catch (_) {}
  pane.term = term; pane.fit = fit; pane.search = search;
  pane.send = (o) => { if (pane.writer) { try { pane.writer.write(enc.encode(JSON.stringify(o) + "\n")); } catch (_) {} } };
  // open only once the wrapper is in the live DOM (detached open leaves input/focus unwired), and
  // let the FIRST resize be the real fitted size (so the server spawns the shell at the true size)
  pane.open = () => {
    if (pane.opened) return; pane.opened = true;
    term.open(termEl);
    try { term.loadAddon(new WebglAddon.WebglAddon()); } catch (e) { console.error("[kedi] webgl addon:", e); }
    requestAnimationFrame(() => {
      try { fit.fit(); } catch (e) { console.error("[kedi] fit:", e); }
      size.textContent = `${term.cols}×${term.rows}`;
      pane.send({ resize: [term.cols, term.rows] });
      setFocus(pane);
    });
  };

  term.onTitleChange((t) => {
    const s = fmtTitle(t, pane); pane.title = s;
    title.textContent = s;
    if (pane.taskChip) pane.taskChip.querySelector(".tlabel").textContent = s;
    if (SETTINGS.layout === "tab") renderTabs();
    if (focused === pane) document.title = s + " · kedi";
  });

  // kitty/PuTTY-style clipboard: selecting COPIES, right-click PASTES (replaces the browser menu
  // inside the terminal — the canvas right-click menu outside panes stays). Middle-click pastes
  // too: with copy-on-select, Linux select→middle-click muscle memory just works.
  term.onSelectionChange(() => {
    const s = term.getSelection();
    if (s) navigator.clipboard.writeText(s).catch(() => {});
  });
  termEl.addEventListener("contextmenu", (e) => { e.preventDefault(); e.stopPropagation(); pasteInto(pane); });
  termEl.addEventListener("mousedown", (e) => { if (e.button === 1) e.preventDefault(); }); // no autoscroll
  termEl.addEventListener("auxclick", (e) => { if (e.button === 1) { e.preventDefault(); pasteInto(pane); } });

  // drag a file (or files) onto the terminal → type its path at the prompt. Browsers hide the real
  // filesystem path for security, so we prefer a text/uri-list `file://` URI (most Linux file
  // managers send it → the true absolute path) and fall back to the bare filename otherwise.
  termEl.addEventListener("dragover", (e) => { e.preventDefault(); e.stopPropagation(); pane.floatwin?.classList.add("dropping"); });
  termEl.addEventListener("dragleave", (e) => { e.stopPropagation(); pane.floatwin?.classList.remove("dropping"); });
  termEl.addEventListener("drop", (e) => {
    e.preventDefault(); e.stopPropagation();
    pane.floatwin?.classList.remove("dropping");
    // a dragged image (from a browser/app) drops as a file → save-and-type-path too
    const img = e.dataTransfer && [...(e.dataTransfer.files || [])].find((f) => f.type.startsWith("image/"));
    if (img) { sendImage(pane, img); return; }
    dropPaths(pane, e.dataTransfer);
  });
  // Ctrl+V of an image: the native paste event carries clipboard items even though xterm handles keys
  termEl.addEventListener("paste", (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith("image/")) { e.preventDefault(); e.stopPropagation(); sendImage(pane, it.getAsFile()); return; }
    }
  }, true);
  term.attachCustomKeyEventHandler((e) => keyHandler(e, pane));
  term.onData((d) => pane.send({ input: d }));
  term.onResize(({ cols, rows }) => { pane.send({ resize: [cols, rows] }); size.textContent = `${cols}×${rows}`; });
  wrapper.addEventListener("mousedown", () => setFocus(pane));

  const stream = await wt.createBidirectionalStream();
  pane.writer = stream.writable.getWriter();
  pane.send({ hello: WHO }); // introduce the claimed identity — first line on the stream
  const reader = stream.readable.getReader();
  (async () => {
    const dec = new TextDecoder();
    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        if (value) {
          // a small chunk carrying a [warden] notice (e.g. policy refusal) → keep it readable
          if (!pane.notice && value.length < 256 && dec.decode(value).includes("[warden]")) pane.notice = true;
          term.write(value, () => syncRender(term));
        }
      }
    } catch (_) {}
    closePane(pane);
  })();
  return pane;
}

function closePane(p) {
  if (!p || p.closing) return; p.closing = true;
  const wait = p.notice ? 2400 : 0; // a [warden] refusal stays on screen long enough to read
  setTimeout(() => {
    try { p.writer && p.writer.close(); } catch (_) {}
    try { p.term.dispose(); } catch (_) {}
    if (p.taskChip) { p.taskChip.remove(); p.taskChip = null; taskbarSync(); }
    if (p.floatwin) { const w = p.floatwin; w.classList.add("closing"); setTimeout(() => w.remove(), 110); }
    if (focused === p) focused = null;
    // allPanes() already excludes p (p.closing is set). In tab mode, reveal a survivor; either way
    // rebuild the strip so the closed tab's chip is gone.
    const next = allPanes()[0];
    if (SETTINGS.layout === "tab" && next) setFocus(next); // setFocus() calls renderTabs()
    else renderTabs();
    if (!document.querySelector(".floatwin")) { $("hint").style.display = "grid"; document.title = "kedi"; }
  }, wait);
}

// ── float windows ──
function spawnFloat(x, y, w, h) {
  makePane().then((pane) => {
    const win = document.createElement("div");
    win.className = "floatwin";
    win.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zTop}`;
    win.appendChild(pane.wrapper);
    pane.floatwin = win;
    const bar = pane.bar;
    const min = document.createElement("button"); min.className = "wc min"; min.title = "minimize";
    const max = document.createElement("button"); max.className = "wc max"; max.title = "maximize / restore";
    const cls = document.createElement("button"); cls.className = "wc close"; cls.title = "close";
    const wcg = document.createElement("div"); wcg.className = "wcgroup"; wcg.append(min, max, cls);
    bar.append(wcg); // no per-window kill — closing is close; kill (attributed) lives in the audit panel
    min.addEventListener("click", (e) => { e.stopPropagation(); minimizePane(pane); });
    max.addEventListener("click", (e) => { e.stopPropagation(); if (pane.shaded) unshadePane(pane); else snapWin(win, pane, "max"); });
    cls.addEventListener("click", (e) => { e.stopPropagation(); closePane(pane); });
    // title-bar click: a shaded (minified) window expands on a single click; otherwise double-click
    // toggles maximize. (A shaded window's body is hidden, so the click can only hit the bar.)
    bar.addEventListener("click", (e) => { if (pane.shaded && !e.target.closest(".wc")) { e.stopPropagation(); unshadePane(pane); } });
    bar.addEventListener("dblclick", (e) => { if (!pane.shaded && !e.target.closest(".wc")) snapWin(win, pane, "max"); });

    const grip = document.createElement("div"); grip.className = "grip"; win.appendChild(grip);
    $("canvas").appendChild(win);
    dragWin(win, bar, pane);
    resizeWin(win, grip, pane);
    win.addEventListener("mousedown", () => { win.style.zIndex = ++zTop; setFocus(pane); });
    $("hint").style.display = "none";
    pane.open();
    if (SETTINGS.layout === "tab") setFocus(pane); // new tab becomes the visible one
    renderTabs();
  });
}
function spawnFloatCascade() { const o = (cascade++ % 6) * 30; spawnFloat(40 + o, 30 + o, 760, 480); }

// ── snapping (drag-to-edge + keyboard) ──
function snapRegion(name) {
  const c = $("canvas"), W = c.clientWidth, H = c.clientHeight, h = Math.round(W / 2), v = Math.round(H / 2);
  return { left:[0,0,h,H], right:[W-h,0,h,H], top:[0,0,W,v], bottom:[0,H-v,W,v],
           tl:[0,0,h,v], tr:[W-h,0,h,v], bl:[0,H-v,h,v], br:[W-h,H-v,h,v], max:[0,0,W,H] }[name];
}
function applyGeom(win, pane, [x, y, w, h]) {
  // animate the move (snap/grid/restore), then fit ONCE at the end — fitting mid-transition would
  // spam the pty with resizes; the terminal briefly stretches then snaps to the exact grid
  win.classList.add("animate");
  win.style.left = x + "px"; win.style.top = y + "px"; win.style.width = w + "px"; win.style.height = h + "px";
  setTimeout(() => {
    win.classList.remove("animate");
    try { pane.fit.fit(); } catch (_) {}
    pane.send({ resize: [pane.term.cols, pane.term.rows] });
  }, 150);
}
function snapWin(win, pane, name) {
  if (name === "max" && win._snap === "max") { restoreWin(win, pane); return; }
  if (!win._restore) win._restore = [win.offsetLeft, win.offsetTop, win.offsetWidth, win.offsetHeight];
  win._snap = name;
  applyGeom(win, pane, snapRegion(name));
}
function restoreWin(win, pane) { if (win._restore) { applyGeom(win, pane, win._restore); win._restore = null; win._snap = null; } }

// ── minimize: two modes ──
// Default is "minify" — collapse the window to its title bar IN PLACE (macOS window-shade); click
// the bar to expand. If the `taskbar` setting is on, minimize stows to the bottom dock instead.
function taskbarSync() { $("taskbar").classList.toggle("show", !!$("taskbar").querySelector(".taskchip")); }
function minimizePane(pane) {
  const win = pane.floatwin;
  if (!win || pane.stowed || pane.shaded || pane.closing) return;
  if (SETTINGS.taskbar) { stowToTaskbar(pane); return; }
  shadePane(pane); // default: collapse to the title bar in place
}
// collapse-to-title in place: remember the full height, drop to the panebar's height.
function shadePane(pane) {
  const win = pane.floatwin;
  pane.shaded = true;
  pane._fullHeight = win.style.height || win.offsetHeight + "px";
  win.classList.add("animate", "shaded");
  win.style.height = pane.bar.offsetHeight + "px";
  if (focused === pane) {
    const rest = allPanes().filter((p) => p !== pane && !p.stowed && !p.shaded);
    focused = null;
    if (rest.length) setFocus(rest[rest.length - 1]);
  }
}
function unshadePane(pane) {
  const win = pane.floatwin;
  pane.shaded = false;
  win.classList.add("animate");
  win.classList.remove("shaded");
  win.style.height = pane._fullHeight || "480px";
  win.style.zIndex = ++zTop;
  requestAnimationFrame(() => { try { pane.fit.fit(); } catch (_) {} pane.send({ resize: [pane.term.cols, pane.term.rows] }); setFocus(pane); });
}
function stowToTaskbar(pane) {
  const win = pane.floatwin;
  pane.stowed = true;
  win.classList.add("stowing");
  setTimeout(() => { win.classList.remove("stowing"); win.classList.add("stowed"); }, 130);
  const chip = document.createElement("button");
  chip.className = "taskchip"; chip.title = "restore";
  chip.innerHTML = '<span class="tdot"></span><span class="tlabel"></span>';
  chip.querySelector(".tlabel").textContent = pane.titleEl.textContent || ("pane " + pane.id);
  chip.addEventListener("click", () => restoreFromTaskbar(pane));
  pane.taskChip = chip;
  $("taskbar").appendChild(chip); taskbarSync();
  if (focused === pane) { const rest = allPanes().filter((p) => p !== pane && !p.stowed); focused = null; if (rest.length) setFocus(rest[rest.length - 1]); }
}
function restoreFromTaskbar(pane) {
  const win = pane.floatwin;
  if (!win) return;
  pane.stowed = false;
  win.classList.remove("stowed", "stowing");
  win.style.zIndex = ++zTop;
  if (pane.taskChip) { pane.taskChip.remove(); pane.taskChip = null; taskbarSync(); }
  requestAnimationFrame(() => { try { pane.fit.fit(); } catch (_) {} pane.send({ resize: [pane.term.cols, pane.term.rows] }); setFocus(pane); });
}
// layout manager (start): arrange all (non-minimized) windows into an even grid
function tileGrid() {
  const wins = [...$("canvas").querySelectorAll(".floatwin")].filter((w) => !w.classList.contains("stowed"));
  if (!wins.length) return;
  const cols = Math.ceil(Math.sqrt(wins.length)), rows = Math.ceil(wins.length / cols);
  const c = $("canvas"), cw = Math.floor(c.clientWidth / cols), ch = Math.floor(c.clientHeight / rows);
  wins.forEach((win, i) => {
    const gx = i % cols, gy = Math.floor(i / cols);
    win._restore = null; win._snap = null;
    applyGeom(win, win.querySelector(".pane")._pane, [gx * cw, gy * ch, cw, ch]);
  });
}
function edgeZone(x, y, W, H) {
  const M = 34, nl = x < M, nr = x > W - M, nt = y < M, nb = y > H - M;
  if (nt && nl) return "tl"; if (nt && nr) return "tr"; if (nb && nl) return "bl"; if (nb && nr) return "br";
  if (nl) return "left"; if (nr) return "right"; if (nt) return "max"; if (nb) return "bottom";
  return null;
}

function dragWin(win, handle, pane) {
  handle.addEventListener("mousedown", (e) => {
    if (e.target.classList.contains("pkill")) return;
    e.preventDefault();
    win.style.zIndex = ++zTop;
    if (win._snap) { win._restore = null; win._snap = null; } // dragging off a snap
    const sx = e.clientX, sy = e.clientY, ox = win.offsetLeft, oy = win.offsetTop;
    const c = $("canvas"), vr = c.getBoundingClientRect(), snap = $("snap");
    let pending = null;
    const move = (ev) => {
      win.style.left = ox + ev.clientX - sx + "px"; win.style.top = Math.max(0, oy + ev.clientY - sy) + "px";
      pending = edgeZone(ev.clientX - vr.left, ev.clientY - vr.top, c.clientWidth, c.clientHeight);
      if (pending) { const [x, y, w, h] = snapRegion(pending); snap.style.cssText = `display:block;left:${x}px;top:${y}px;width:${w}px;height:${h}px`; }
      else snap.style.display = "none";
    };
    const up = () => { document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); snap.style.display = "none"; if (pending) snapWin(win, pane, pending); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  });
}
function resizeWin(win, grip, pane) {
  grip.addEventListener("mousedown", (e) => {
    e.preventDefault(); e.stopPropagation();
    const sx = e.clientX, sy = e.clientY, ow = win.offsetWidth, oh = win.offsetHeight;
    const move = (ev) => { win.style.width = Math.max(200, ow + ev.clientX - sx) + "px"; win.style.height = Math.max(130, oh + ev.clientY - sy) + "px"; try { pane.fit.fit(); } catch (_) {} };
    const up = () => { document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); try { pane.fit.fit(); } catch (_) {} pane.send({ resize: [pane.term.cols, pane.term.rows] }); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  });
}

// draw a rectangle on the empty canvas → a window there. A plain CLICK does nothing (accidental
// clicks were spawning terminals); the marquee appears only after real movement, and a drag under
// the minimum size is treated as a click. Double-click = default-size window at the pointer.
const onCanvas = (e) => e.target === $("canvas") || e.target.closest("#hint,#watermark");
$("canvas").addEventListener("mousedown", (e) => {
  if (e.button !== 0 || !onCanvas(e)) return;
  const c = $("canvas"), r = c.getBoundingClientRect();
  const x0 = e.clientX - r.left, y0 = e.clientY - r.top;
  let m = null; // marquee only materializes past the drag threshold
  const box = (ev) => { const x = ev.clientX - r.left, y = ev.clientY - r.top; return { L: Math.min(x, x0), T: Math.min(y, y0), W: Math.abs(x - x0), H: Math.abs(y - y0) }; };
  const move = (ev) => {
    const q = box(ev);
    if (!m && (q.W > 8 || q.H > 8)) { m = document.createElement("div"); m.className = "marquee"; c.appendChild(m); }
    if (m) m.style.cssText = `left:${q.L}px;top:${q.T}px;width:${q.W}px;height:${q.H}px`;
  };
  const up = (ev) => {
    document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up);
    if (m) m.remove();
    const q = box(ev);
    if (q.W > 100 && q.H > 80) spawnFloat(q.L, q.T, q.W, q.H); // a click / tiny drag spawns nothing
  };
  document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
});
$("canvas").addEventListener("dblclick", (e) => {
  if (!onCanvas(e)) return;
  const r = $("canvas").getBoundingClientRect();
  spawnFloat(Math.max(0, e.clientX - r.left - 100), Math.max(0, e.clientY - r.top - 60), 760, 480);
});

// right-click on the EMPTY canvas → kedi menu; inside a terminal the native menu stays (copy/paste)
function hideCtx() { $("ctxmenu").style.display = "none"; }
$("canvas").addEventListener("contextmenu", (e) => {
  if (!onCanvas(e)) return; // panes keep the browser menu
  e.preventDefault();
  const r = $("canvas").getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  const items = [
    ["new terminal here", "dbl-click", () => spawnFloat(Math.max(0, x - 100), Math.max(0, y - 60), 760, 480)],
    ["arrange grid", "C-S-g", tileGrid],
    ["audit", "", openAudit],
    ["settings", "C-S-,", () => toggleSettings(true)],
  ];
  const m = $("ctxmenu"); m.innerHTML = "";
  for (const [label, key, fn] of items) {
    const it = document.createElement("div"); it.className = "cm-item";
    it.innerHTML = `<span></span><span class="cm-k"></span>`;
    it.firstChild.textContent = label; it.lastChild.textContent = key;
    it.addEventListener("click", () => { hideCtx(); fn(); });
    m.appendChild(it);
  }
  m.style.display = "block";
  m.style.left = Math.min(x, $("canvas").clientWidth - m.offsetWidth - 8) + "px";
  m.style.top = Math.min(y, $("canvas").clientHeight - m.offsetHeight - 8) + "px";
});
document.addEventListener("mousedown", (e) => { if (!e.target.closest("#ctxmenu")) hideCtx(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") hideCtx(); });

// ── search / clipboard ──
function toggleSearch(show) {
  const box = $("search"); const on = show ?? box.style.display !== "flex";
  box.style.display = on ? "flex" : "none";
  if (on) { $("search-input").value = ""; $("search-input").focus(); } else if (focused) focused.term.focus();
}
$("search-input").addEventListener("input", (e) => focused && focused.search.findNext(e.target.value, { incremental: true }));
$("search-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); focused && focused.search[e.shiftKey ? "findPrevious" : "findNext"]($("search-input").value); }
  else if (e.key === "Escape") { e.preventDefault(); toggleSearch(false); }
});
function copySel(p) { const s = p.term.getSelection(); if (s) navigator.clipboard.writeText(s).catch(() => {}); }
function pasteInto(p) {
  // try an image on the clipboard first (→ save-and-type-path via the pty op); else paste text
  if (navigator.clipboard.read) {
    navigator.clipboard.read().then(async (items) => {
      for (const it of items) {
        const type = it.types.find((t) => t.startsWith("image/"));
        if (type) { const blob = await it.getType(type); sendImage(p, blob); return; }
      }
      navigator.clipboard.readText().then((t) => t && p.send({ input: t })).catch(() => {});
    }).catch(() => { navigator.clipboard.readText().then((t) => t && p.send({ input: t })).catch(() => {}); });
  } else {
    navigator.clipboard.readText().then((t) => t && p.send({ input: t })).catch(() => {});
  }
}

// shell-quote a path so spaces/specials survive being typed at the prompt (single-quote wrap; any
// embedded single quote becomes '\'' ). Keeps a dropped "/home/okkan/my file.txt" intact.
const shquote = (s) => "'" + s.replace(/'/g, "'\\''") + "'";

// A dropped file → its path at the prompt. Prefer a text/uri-list `file://` URI (real absolute path
// from the file manager); fall back to text/plain, then to the bare filename (browsers withhold the
// full path of a raw File for security). Multiple files → space-separated.
function dropPaths(pane, dt) {
  if (!dt) return;
  let paths = [];
  const uris = dt.getData("text/uri-list");
  if (uris) {
    paths = uris.split(/\r?\n/).filter((l) => l && !l.startsWith("#")).map((u) => {
      try { return u.startsWith("file://") ? decodeURIComponent(new URL(u).pathname) : u; }
      catch (_) { return u; }
    });
  }
  if (!paths.length) {
    const txt = dt.getData("text/plain");
    if (txt && txt.trim()) paths = txt.split(/\r?\n/).filter(Boolean);
  }
  if (!paths.length && dt.files && dt.files.length) paths = [...dt.files].map((f) => f.name);
  if (paths.length) pane.send({ input: paths.map(shquote).join(" ") + " " });
}

// Send a clipboard/dropped image blob to the pty's `paste-image` op (base64 in JSON); the server
// writes it under ~/.cache/kedi and types the path back at the prompt.
function sendImage(pane, blob) {
  const ext = (blob.type.split("/")[1] || "png").replace(/[^a-z0-9]/gi, "") || "png";
  blob.arrayBuffer().then((buf) => {
    let bin = ""; const b = new Uint8Array(buf);
    for (let i = 0; i < b.length; i++) bin += String.fromCharCode(b[i]);
    pane.send({ pasteImage: btoa(bin), ext });
  }).catch(() => {});
}

// ── audit: one governance surface (live sessions · timeline · reconstruction) ──
// The record is the source of truth. While open we poll /record?since=N incrementally, fold events
// into per-session state, append to the timeline, and reconstruct the SELECTED session's screen from
// its OUTPUT events (exactly what the operator saw — never raw input). "live" follows the tail;
// grabbing the scrub detaches into replay of that session at a point in time. Kill lives next to the
// session it acts on. Recording off → the panel explains audit needs a record (control still works
// via close/policy; there's simply no trail to show).
const hexToBytes = (h) => { const n = (h || "").length >> 1, u = new Uint8Array(n); for (let i = 0; i < n; i++) u[i] = parseInt(h.slice(i * 2, i * 2 + 2), 16); return u; };
const evClass = (e) => ({ session_opened: "t-session", session_closed: "t-session", cap_granted: "t-grant", output: "t-output", killed: "t-kill", denied: "t-deny", rejected: "t-deny" }[e.t] || "t-call");
function evLabel(e) {
  switch (e.t) {
    case "session_opened": return `▷ opened · ${e.identity}`;
    case "session_closed": return "◁ closed";
    case "cap_granted": return `⚿ granted ${e.kind}`;
    case "call": return e.op === "resize" ? "⤢ resize" : "⌨ input"; // no raw content — keystroke bytes are control-char noise
    case "result": return "· result";
    case "output": return `» output · ${((e.bytes || "").length >> 1)}B`;
    case "killed": return `✖ killed by ${e.by}`;
    case "denied": return `⛔ denied · ${e.subject}${e.why ? " — " + e.why : ""}`;
    case "revoked": return "⊘ revoked";
    default: return e.t;
  }
}

const au = { term: null, fit: null, timer: null, raf: 0, seen: 0, events: [], sessions: [], sel: null, live: true };

function openAudit() {
  $("audit").classList.remove("hide");
  if (!au.term) {
    au.term = new Terminal({ fontFamily: SETTINGS.fontFamily, fontSize: 13, lineHeight: 1.0, cursorBlink: false, scrollback: 8000, disableStdin: true, theme: activeTheme() });
    au.fit = new FitAddon.FitAddon(); au.term.loadAddon(au.fit); au.term.open($("au-term"));
    try { au.term.loadAddon(new WebglAddon.WebglAddon()); } catch (_) {}
  }
  requestAnimationFrame(() => { try { au.fit.fit(); } catch (_) {} });
  renderRecState();
  clearInterval(au.timer); pollAudit(); au.timer = setInterval(pollAudit, 1200);
}
function closeAudit() { clearInterval(au.timer); au.timer = null; $("audit").classList.add("hide"); }
function auVerify(cls, msg) { const v = $("au-verify"); v.className = "badge " + cls; v.textContent = msg; }

async function pollAudit() {
  // 1) live sessions — from the warden's own state, so the list + kill work even with recording off
  try { const sj = await (await fetch("/sessions", { cache: "no-store" })).json(); au.sessions = sj.sessions || []; }
  catch (_) { au.sessions = []; }
  if (au.sel === null || !au.sessions.some((s) => s.id === au.sel)) {
    au.sel = au.sessions.length ? au.sessions[au.sessions.length - 1].id : au.sel;
  }
  renderSessions();
  // 2) the record — timeline + reconstruction (has content only while/after recording is on)
  let d;
  try { d = await (await fetch("/record?since=" + au.seen, { cache: "no-store" })).json(); }
  catch (_) { auVerify("bad", "✗ record fetch failed"); return; }
  if (!d.ok) { auVerify("bad", "✗ " + (d.error || "chain broken")); return; }
  if (d.count < au.seen) { au.seen = 0; au.events = []; $("au-feed").innerHTML = ""; } // record reset (server restart)
  const feed = $("au-feed");
  for (let i = 0; i < d.events.length; i++) {
    const e = d.events[i]; au.events.push(e);
    const row = document.createElement("div"); row.className = "au-ev " + evClass(e);
    const n = document.createElement("span"); n.className = "i"; n.textContent = d.since + i + 1;
    const t = document.createElement("span"); t.className = "d"; t.textContent = `s${e.session} · ` + evLabel(e);
    row.append(n, t); feed.appendChild(row);
  }
  while (feed.children.length > 250) feed.removeChild(feed.firstChild);
  if (d.events.length && au.live) feed.scrollTop = feed.scrollHeight;
  au.seen = d.count;
  if (d.count === 0) auVerify(recOn ? "ok" : "off", recOn ? "✓ recording · 0 events" : "recording off · flip record on →");
  else auVerify("ok", `✓ chain verified · ${d.count} events`);
  if (au.live) reconLive();
}

function renderSessions() {
  const box = $("au-sessions"); box.innerHTML = "";
  if (!au.sessions.length) { box.innerHTML = '<div class="au-empty">no live sessions — open a terminal.</div>'; return; }
  for (const s of au.sessions) {
    const row = document.createElement("div"); row.className = "au-sess" + (s.id === au.sel ? " sel" : "");
    const r1 = document.createElement("div"); r1.className = "r1";
    const dot = document.createElement("span"); dot.className = "live-dot";
    const sid = document.createElement("span"); sid.className = "sid"; sid.textContent = "#" + s.id;
    const who = document.createElement("span"); who.className = "who"; who.textContent = s.who;
    r1.append(dot, sid, who);
    const r2 = document.createElement("div"); r2.className = "r2";
    const caps = document.createElement("span"); caps.className = "caps"; caps.textContent = (s.caps || []).join(" ") || "—";
    const kill = document.createElement("button"); kill.className = "au-kill"; kill.textContent = "kill";
    kill.title = "kill — records an attributed Event::Killed, then ends the session";
    kill.addEventListener("click", async (e) => {
      e.stopPropagation();
      try { await fetch(`/kill?session=${s.id}&by=${WHO}`, { method: "POST" }); } catch (_) {}
      setTimeout(pollAudit, 300);
    });
    r2.append(caps, kill);
    row.append(r1, r2);
    row.addEventListener("click", () => selectSession(s.id));
    box.appendChild(row);
  }
}
const selEvents = () => (au.sel === null ? [] : au.events.filter((e) => e.session === au.sel));
function selectSession(id) { au.sel = id; goLive(); renderSessions(); }
function reconLive() {
  const evs = selEvents();
  $("au-scrub").max = evs.length; $("au-scrub").value = evs.length;
  renderRecon(evs, evs.length);
}
function renderRecon(evs, k) {
  k = Math.max(0, Math.min(k, evs.length));
  $("au-pos").textContent = au.sel === null ? "" : `#${au.sel} · ${k}/${evs.length}`;
  let total = 0; const chunks = [];
  for (let i = 0; i < k; i++) { const e = evs[i]; if (e.t === "output" && e.bytes) { const u = hexToBytes(e.bytes); chunks.push(u); total += u.length; } }
  const buf = new Uint8Array(total); let off = 0;
  for (const c of chunks) { buf.set(c, off); off += c.length; }
  au.term.reset();
  if (buf.length) au.term.write(buf);
}
function scrubTo(k) {
  setLive(false);
  if (au.raf) cancelAnimationFrame(au.raf);
  au.raf = requestAnimationFrame(() => renderRecon(selEvents(), k));
}
function setLive(on) { au.live = on; $("au-live").classList.toggle("on", on); }
function goLive() { setLive(true); reconLive(); }

$("au-scrub").addEventListener("input", (e) => scrubTo(Number(e.target.value)));
$("au-live").addEventListener("click", goLive);
document.querySelectorAll(".au-btn[data-a]").forEach((b) => b.addEventListener("click", () => {
  const a = b.dataset.a, evs = selEvents(), k = Number($("au-scrub").value);
  if (a === "end") return goLive();
  const nk = Math.max(0, Math.min(a === "start" ? 0 : a === "back" ? k - 1 : k + 1, evs.length));
  $("au-scrub").value = nk; scrubTo(nk);
}));
$("au-close").addEventListener("click", closeAudit);

// ── recording toggle: activate/deactivate the tamper-evident record at runtime ──
function renderRecState() {
  document.body.classList.toggle("rec", recOn); // drives every pane's "● rec" badge at once
  $("audit-btn").classList.toggle("rec", recOn);
  $("au-rec").classList.toggle("on", recOn);
  $("au-rec-label").textContent = recOn ? "recording" : "record";
}
async function setRec(on) {
  try { const r = await (await fetch("/rec?on=" + (on ? 1 : 0), { method: "POST" })).json(); recOn = !!r.on; } catch (_) {}
  renderRecState(); pollAudit();
}
$("au-rec").addEventListener("click", () => setRec(!recOn));

// ── header: identity, warden, the audit entry point, help ──
$("warden-name").textContent = WARDEN;
renderWho(); renderRecState();
$("idchip").addEventListener("click", () => {
  const w = sanitizeWho(prompt("identity for new sessions (claimed, unauthenticated):", WHO));
  if (w) { WHO = w; localStorage.setItem("kedi.who", WHO); renderWho(); }
});
$("audit-btn").addEventListener("click", () => $("audit").classList.contains("hide") ? openAudit() : closeAudit());

// ── settings panel ─────────────────────────────────────────────────────────────────────────────
function toggleSettings(show) {
  const s = $("settings");
  const open = show ?? s.classList.contains("hide");
  s.classList.toggle("hide", !open);
  if (open) syncSettingsForm();
}
// Populate the theme dropdown once from THEMES.
for (const [k, v] of Object.entries(THEMES)) {
  const o = document.createElement("option"); o.value = k; o.textContent = v.label; $("set-theme").appendChild(o);
}
// Reflect SETTINGS into the form controls (also called after zoom / reset so they stay in sync).
function syncSettingsForm() {
  $("set-theme").value = SETTINGS.theme;
  $("set-font").value = SETTINGS.fontSize; $("set-font-val").textContent = SETTINGS.fontSize + "px";
  $("set-family").value = SETTINGS.fontFamily;
  $("set-blink").checked = SETTINGS.cursorBlink;
  $("set-taskbar").checked = SETTINGS.taskbar;
  $("set-lh").value = SETTINGS.lineHeight; $("set-lh-val").textContent = SETTINGS.lineHeight.toFixed(2);
  $("set-ls").value = SETTINGS.letterSpacing; $("set-ls-val").textContent = SETTINGS.letterSpacing;
  $("set-scroll").value = SETTINGS.scrollback; $("set-scroll-val").textContent = SETTINGS.scrollback.toLocaleString();
  for (const b of $("set-cursor").children) b.classList.toggle("on", b.dataset.v === SETTINGS.cursorStyle);
  for (const b of $("set-layout").children) b.classList.toggle("on", b.dataset.v === SETTINGS.layout);
  for (const b of $("set-wc").children) b.classList.toggle("on", b.dataset.v === SETTINGS.winControls);
}
// One helper: mutate SETTINGS[key], apply live, and reflect back into the form.
const setOpt = (key, val) => { SETTINGS[key] = val; applySettings(); syncSettingsForm(); };

$("settings-btn").addEventListener("click", () => toggleSettings(true));
$("settings").addEventListener("mousedown", (e) => { if (e.target === $("settings")) toggleSettings(false); });
$("set-theme").addEventListener("change", (e) => setOpt("theme", e.target.value));
$("set-font").addEventListener("input", (e) => setOpt("fontSize", Number(e.target.value)));
$("set-family").addEventListener("change", (e) => setOpt("fontFamily", e.target.value.trim() || FONT));
$("set-blink").addEventListener("change", (e) => setOpt("cursorBlink", e.target.checked));
$("set-taskbar").addEventListener("change", (e) => { SETTINGS.taskbar = e.target.checked; saveSettings(); syncSettingsForm(); });
$("set-lh").addEventListener("input", (e) => setOpt("lineHeight", Number(e.target.value)));
$("set-ls").addEventListener("input", (e) => setOpt("letterSpacing", Number(e.target.value)));
$("set-scroll").addEventListener("input", (e) => setOpt("scrollback", Number(e.target.value)));
$("set-cursor").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) setOpt("cursorStyle", b.dataset.v); });
$("set-layout").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) setLayout(b.dataset.v); });
$("set-wc").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) { SETTINGS.winControls = b.dataset.v; applyPlatform(); saveSettings(); syncSettingsForm(); } });
$("set-reset").addEventListener("click", () => { SETTINGS = { ...DEFAULT_SETTINGS }; setLayout(SETTINGS.layout); applySettings(); syncSettingsForm(); });

$("quit-btn").addEventListener("click", async () => {
  if (!confirm("Shut down kedi?\nEvery session ends and the background server stops.")) return;
  try { await fetch("/shutdown", { method: "POST" }); } catch (_) { /* the socket dropping is the ack */ }
  overlay("kedi stopped.<br><span style='opacity:.6'>relaunch from the app icon, or <code>kedi --open</code>.</span>");
});

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (!$("settings").classList.contains("hide")) toggleSettings(false);
  else if (!$("audit").classList.contains("hide")) closeAudit();
});

function keyHandler(e, pane) {
  if (e.type !== "keydown" || !e.ctrlKey || !e.shiftKey) return true;
  const k = e.key.toLowerCase();
  const fw = focused && focused.floatwin;
  let ok = true;
  switch (k) {
    case "n": case "d": spawnFloatCascade(); break;
    case "w": closePane(focused); break;
    case "f": toggleSearch(true); break;
    case "c": copySel(pane); break;
    case "v": pasteInto(pane); break;
    case "+": case "=": zoom(1); break;
    case "-": case "_": zoom(-1); break;
    case "0": zoom(0); break;
    case "arrowleft": fw ? snapWin(fw, focused, "left") : (ok = false); break;
    case "arrowright": fw ? snapWin(fw, focused, "right") : (ok = false); break;
    case "arrowup": fw ? snapWin(fw, focused, "max") : (ok = false); break;
    case "arrowdown": fw ? restoreWin(fw, focused) : (ok = false); break;
    case "g": tileGrid(); break;
    case "m": focused ? minimizePane(focused) : (ok = false); break;
    case ",": case "<": toggleSettings(); break; // Ctrl+Shift+, → settings
    default: ok = false;
  }
  if (ok) { e.preventDefault(); return false; }
  return true;
}

function overlay(html) { const o = $("overlay"); o.style.display = "grid"; o.innerHTML = html; }

async function boot() {
  try { await document.fonts.load('14px "FiraCode Nerd Font Mono"'); await document.fonts.ready; } catch (_) {}
  try {
    wt = new WebTransport(WT_URL, { serverCertificateHashes: [{ algorithm: "sha-256", value: CERT_HASH }] });
    await wt.ready;
  } catch (e) {
    setState("connect failed", false);
    overlay("<div style='color:#f0716f'>WebTransport connect failed — " + e +
      "<br><span style='color:#5c6b82'>Chromium-based browser; page at http://localhost / 127.0.0.1 / *.localhost</span></div>");
    return;
  }
  setState("connected", true);
  setLayout(SETTINGS.layout); applySettings(); // restore saved theme / font / cursor / layout
  spawnFloatCascade(); // open with one terminal; draw or Ctrl+Shift+N for more
  _lastCanvas = { w: $("canvas").clientWidth, h: $("canvas").clientHeight };
  // coalesce the rapid resize-event stream to one reflow per frame (avoids spamming pty resizes)
  let _reflowPending = false;
  window.addEventListener("resize", () => {
    if (_reflowPending) return;
    _reflowPending = true;
    requestAnimationFrame(() => { _reflowPending = false; reflowWindows(); });
  });
  wt.closed.finally(() => { setState("disconnected", false); overlay("connection lost — sessions ended (no persistence, by design).<br><button onclick='location.reload()'>reconnect</button>"); });
}
boot();
</script>
</body>
</html>
